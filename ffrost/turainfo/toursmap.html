<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <title>Túratérkép</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html,body {height:100%; margin:0;}
    .wrap {position:fixed; inset:0;}
    iframe {width:100%; height:100%; border:0;}
    .fallback {position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font:16px/1.4 system-ui; padding:1rem; text-align:center;}
    .fallback a { margin-left:.35rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe src="https://fabuszilard.myftp.org/turamap/" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
    <div class="fallback">
      Ha az iframe nem tölt be, kattints ide:
      <a href="https://fabuszilard.myftp.org/turamap/">túratérkép</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <!-- Statikus erőforrások relatív útvonallal -->
    <link rel="icon" href="static/images/fflogo.png" type="image/png">
    <link rel="shortcut icon" href="static/images/fflogo.png" type="image/png">
    <title>FF_túraadatok - Bejelentkezés</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container" style="max-width: 400px; margin-top: 100px;">
    <h3>Bejelentkezés</h3>
    <!-- Hibák megjelenítésére szolgáló hely -->
    <div id="errorMsg" class="alert alert-danger" style="display: none;"></div>
    <form id="loginForm" method="post" action="https://fdriveanalytics.com/ffrost/turainfo/login">
        <div class="form-group">
            <label>Felhasználónév v. depó (pl. depo02)</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Jelszó</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Bejelentkezés</button>
    </form>
</div>

<!-- jQuery betöltése -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function(){
    $('#loginForm').on('submit', function(e){
        e.preventDefault(); // Ne küldje el hagyományosan az űrlapot

        $.ajax({
            url: "https://fdriveanalytics.com/ffrost/turainfo/login", // Ellenőrizd az URL-t
            type: 'POST',
            data: $(this).serialize(),
            xhrFields: { withCredentials: true }, // Cookie-k küldése
            success: function(response){
                if(response.success) {
                    window.location.href = response.redirect;
                } else {
                    $('#errorMsg').text(response.error).show();
                }
            },
            error: function(xhr){
                console.log(xhr);
                $('#errorMsg').text('Hiba történt a bejelentkezés során.').show();
            }
        });
    });
});
</script>
</body>
</html>

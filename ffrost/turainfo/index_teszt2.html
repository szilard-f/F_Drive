<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="icon" href="./static/images/logo.png" type="image/png">
  <link rel="shortcut icon" href="./static/images/logo.png" type="image/png">
  <title>FF_túraadatok</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    :root { --logo-size: 100px; }
    .logo-container img { max-width: 100%; height: auto; }
    .btn { display: inline-flex; align-items: center; justify-content: center; }
    .red { color: red; font-weight: bold; }
    .blue { color: blue; font-weight: bold; }
    table.table th { text-align: center !important; vertical-align: middle; }
    .maintenance-overlay {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background-color: #f8f9fa;
      text-align: center;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .maintenance-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      width: 80%;
      max-width: 400px;
      margin: auto;
    }
    .countdown {
      font-size: 2rem;
      color: #dc3545;
      margin-top: 15px;
    }
    .inactive-highlight {
      background-color: rgba(255, 0, 0, 0.1);
      outline: 2px solid red;
      outline-offset: -2px;
      border-radius: 4px;
      padding: 0.5em;
      transition: background-color 0.3s ease;
    }
    .inactive-highlight td {
      background-color: rgba(255, 0, 0, 0.1);
    }
    table.table {
      border-collapse: separate;
      border-spacing: 0 0.1px;
    }
    @media (max-width: 576px) {
      .maintenance-box { width: 90%; padding: 1rem; }
      .countdown { font-size: 1.5rem; }
      body { font-size: 1rem; }
      .btn { font-size: 1rem; padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>

<div class="maintenance-overlay" id="maintenance-overlay">
  <div class="maintenance-box">
    <h1>⛔ Jelenleg karbantartás zajlik ⛔</h1>
    <div>Várható újraindítás: <strong id="target-time">2025.05.01 08:00:00</strong></div>
    <div class="countdown" id="countdown-timer">00:00:00</div>
  </div>
</div>

<div class="container my-3" id="main-content">
  <div class="row align-items-center mb-4">
    <div class="col">
      <h3><span class="red">F</span><span class="blue">F</span>_túraadatok – részletes lekérdezés</h3>
    </div>
    <div class="col-auto logo-container">
      <img src="./static/images/fflogo.png" alt="FD logo">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-12 col-md-6 mb-3 mb-md-0">
      <label for="search-input">Település vagy irányítószám</label>
      <input type="text" id="search-input" class="form-control" placeholder="pl. Budapest vagy 1037">
    </div>
    <div class="col-12 col-md-6">
      <label for="street-input">Közterület (opcionális)</label>
      <input type="text" id="street-input" class="form-control" placeholder="pl. József Attila utca">
      <small class="form-text text-muted">A közterület-szűrés csak település megadása után működik!</small>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-6">
      <button id="search-btn" class="btn btn-primary btn-block">Keresés</button>
    </div>
    <div class="col-6">
      <button id="clear-btn" class="btn btn-danger btn-block">Szűrések törlése</button>
    </div>
  </div>

  <div id="results"></div>
  <div id="details"></div>
</div>

<script>
  const rawTime = document.getElementById("target-time").textContent.trim();
  const formattedTime = rawTime.replace(/\./g, "-").replace(" ", "T");
  const targetDate = new Date(formattedTime);
  const now = new Date();
  const maintenanceMode = now < targetDate;

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;
    if (diff <= 0) {
      document.getElementById("countdown-timer").innerText = "Karbantartás véget ért. Frissítés...";
      setTimeout(() => location.reload(), 2000);
      return;
    }
    const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours   = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown-timer").innerText =
      `${days} nap ${hours} óra ${minutes} perc ${seconds} mp`;
  }

  if (maintenanceMode) {
    document.getElementById("main-content").style.display = "none";
    const overlay = document.getElementById("maintenance-overlay");
    overlay.style.display = "flex";
    overlay.classList.add("d-flex");
    setInterval(updateCountdown, 1000);
    updateCountdown();
  }
</script>

</body>
</html>

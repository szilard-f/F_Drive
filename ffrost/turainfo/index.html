<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>FF_túraadatok - részletes lekérdezés</title>

    <!-- Bootstrap, jQuery UI, Font‑Awesome -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        :root {
            --logo-size: 80px;
        }
        .logo-container img {
            width: var(--logo-size);
            height: auto;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .red { color: red; font-weight: bold; }
        .blue { color: blue; font-weight: bold; }
        table.table th {
            text-align: center !important;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container my-3">
        <!-- fejléc sor: balra cím, jobbra logó -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3><span class="red">F</span><span class="blue">F</span>_túraadatok – részletes lekérdezés</h3>
            <div class="logo-container">
                <img id="logo" src="" alt="FF logo">
            </div>
        </div>

        <div class="form-group">
            <label for="search-input">Település vagy irányítószám</label>
            <input type="text" id="search-input" class="form-control" placeholder="Pl. Budapest vagy 1037" style="width:300px;">
        </div>
        <div class="form-group">
            <label for="street-input">Közterület (opcionális)</label>
            <input type="text" id="street-input" class="form-control" placeholder="Közterület" style="width:300px;">
            <small class="form-text text-muted">A közterület szűrés csak település megadása után működik!</small>
        </div>
        <div class="d-flex align-items-center mb-3">
            <button id="search-btn" class="btn btn-primary">Keresés</button>
            <button id="clear-btn" class="btn btn-danger ml-3">Szűrések törlése</button>
        </div>

        <hr>
        <div id="results"></div>
        <div id="details"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <script>
    // ide írd a routered címét:
    const backendUrl = "http://192.168.1.101:5012";

    // logó beállítása
    document.getElementById('logo').src = backendUrl + '/static/images/fdlogo.png';

    $(function(){
        function removeAccents(str){
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
        }

        $('#search-input').autocomplete({
            source: (req, res) => $.getJSON(backendUrl+'/suggest',{field:'city',q:req.term},res),
            minLength: 2
        });

        $('#street-input').autocomplete({
            source: (req, res) => {
                const city = $('#search-input').val().trim();
                if(!city){ return res([]); }
                $.getJSON(backendUrl+'/suggest',{field:'street',q:req.term,city},res);
            },
            minLength: 2
        });

        $('#clear-btn').click(()=>{
            $('#search-input,#street-input').val('');
            $('#results,#details').empty();
        });

        $('#search-btn').click(()=>{
            const q = $('#search-input').val().trim(),
                  s = $('#street-input').val().trim();
            $('#results,#details').empty();
            if(!q){ return alert("Kérem adja meg a települést vagy irányítószámot!"); }

            $.ajax({
                url: backendUrl + '/search',
                data: { q, street: s },
                success(resp){
                    // admin–admin összesítés
                    if(resp.length && resp[0].tours_count!==undefined){
                        let html = '<table class="table table-bordered"><thead><tr>'
                                 +'<th>Depó és feltöltött túrák száma</th>'
                                 +'</tr></thead><tbody>';
                        resp.forEach(i=>{
                            html += `<tr><td>${i.depo}_${i.tours_count} db</td></tr>`;
                        });
                        html += '</tbody></table>';
                        return $('#results').html(html);
                    }
                    // normál találatok
                    if(!resp.length){
                        return $('#results').html('<p>Nincs találat.</p>');
                    }
                    let tbl = '<table class="table table-bordered"><thead><tr>'
                            +'<th>Depó</th><th>Túraszám</th><th>Település</th>'
                            +'<th>Irányítószám</th><th>Közterület</th><th>Nap</th>'
                            +'<th>Időintervallum</th><th>Műveletek</th>'
                            +'</tr></thead><tbody>';
                    resp.forEach(it=>{
                        tbl += `<tr class="summary" data-depo="${it.depo}" data-tour_number="${it.tour_number}">`
                             +`<td class="text-center">${it.depo}</td>`
                             +`<td class="text-center">${it.tour_number}</td>`
                             +`<td>${it.city}</td>`
                             +`<td class="text-center">${it.postal_code}</td>`
                             +`<td>${it.street}</td>`
                             +`<td class="text-center">${it.date}</td>`
                             +`<td class="text-center">${it.time_interval}</td>`
                             +`<td class="text-center">`
                               +`<button class="btn btn-info btn-sm details-btn">Részletek</button> `
                               +`<button class="btn btn-secondary btn-sm pdf-btn">PDF letöltés</button>`
                             +`</td>`
                             +`</tr>`;
                    });
                    tbl += '</tbody></table>';
                    $('#results').html(tbl);
                },
                error(){
                    $('#results').html('<p>Hiba történt a keresés során.</p>');
                }
            });

            // mezők törlése
            $('#search-input,#street-input').val('');
        });

        // Részletek
        $('#results').on('click','.details-btn',function(){
            const row = $(this).closest('.summary');
            $.get(backendUrl+'/details',{
                depo: row.data('depo'),
                tour_number: row.data('tour_number')
            }, html=>{
                $('#details').html(html);
                $('html,body').animate({scrollTop:$('#details').offset().top},500);
            });
        });

        // PDF
        $('#results').on('click','.pdf-btn',function(){
            const row = $(this).closest('.summary');
            window.open(backendUrl + '/pdf?depo='
                        +encodeURIComponent(row.data('depo'))
                        +'&tour_number='+encodeURIComponent(row.data('tour_number')));
        });
    });
    </script>
</body>
</html>

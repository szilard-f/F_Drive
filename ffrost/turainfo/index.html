<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma"        content="no-cache">
  <meta http-equiv="Expires"       content="0">

  <!-- ── favicon relatív útvonallal ── -->
  <link rel="icon"          href="static/images/fflogo.png" type="image/png">
  <link rel="shortcut icon" href="static/images/fflogo.png" type="image/png">

  <title>FF_túraadatok – részletes lekérdezés</title>

  <!-- könyvtárak -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

  <style>
    :root{ --logo-size:180px; }
    .logo-container img{ width:var(--logo-size); height:auto; }
    .btn{ display:inline-flex; align-items:center; justify-content:center; }
    .red{ color:red;  font-weight:bold; }
    .blue{color:blue; font-weight:bold; }
    table.table th{ text-align:center!important; vertical-align:middle; }
  </style>
</head>
<body>
  <div class="container my-3">
    <!-- fejléc + logó -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3><span class="red">F</span><span class="blue">F</span>_túraadatok – részletes lekérdezés</h3>
      <div class="logo-container">
        <!-- logó szintén relatív útvonalon -->
        <img src="static/images/fdlogo.png" alt="FF logo">
      </div>
    </div>

    <!-- keresőmezők -->
    <div class="form-group">
      <label for="search-input">Település vagy irányítószám</label>
      <input type="text" id="search-input" class="form-control"
             placeholder="Pl. Budapest vagy 1037" style="width:300px;">
    </div>

    <div class="form-group">
      <label for="street-input">Közterület (opcionális)</label>
      <input type="text" id="street-input" class="form-control" placeholder="Közterület"
             style="width:300px;">
      <small class="form-text text-muted">
        A közterület‑szűrés csak település megadása után működik.
      </small>
    </div>

    <div class="d-flex align-items-center mb-3">
      <button id="search-btn" class="btn btn-primary">Keresés</button>
      <button id="clear-btn"  class="btn btn-danger  ml-3">Szűrések törlése</button>
    </div>
    <hr>
    <div id="results"></div>
    <div id="details"></div>
  </div>

  <!-- JS‑könyvtárak -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

  <!-- Flask‑szerver alap‑URL‑je -->
  <script>
    const backendUrl = "https://fabuszilard.myftp.org/turainfo/";
  </script>

  <script>
  $(function(){

    const $city   = $('#search-input');
    const $street = $('#street-input');

    /* ── autocomplete ───────────────────────────────────────────── */
    $city.autocomplete({
      source(request, response){
        $.getJSON( backendUrl + 'suggest',
                   { field:'city', q:request.term }, response );
      },
      minLength: 2
    });

    $street.autocomplete({
      source(request, response){
        const city = $city.val().trim();
        if(!city){ response([]); return; }
        $.getJSON( backendUrl + 'suggest',
                   { field:'street', q:request.term, city }, response );
      },
      minLength: 2
    });

    /* ── törlés ── */
    $('#clear-btn').click(()=>{
      $city.val(''); $street.val('');
      $('#results,#details').empty();
    });

    /* ── keresés ── */
    $('#search-btn').click(()=>{
      const q = $city.val().trim();
      const s = $street.val().trim();
      $('#results,#details').empty();
      if(!q){ alert('Kérem adja meg a települést vagy irányítószámot!'); return; }

      $.ajax({
        url : backendUrl + 'search',
        data: { q, street:s },
        success(data){

          /* admin‑admin nézet */
          if(data.length && data[0].tours_count!==undefined){
            let h='<table class="table table-bordered"><thead><tr>'
                + '<th>Depó és feltöltött túrák száma</th>'
                + '</tr></thead><tbody>';
            data.forEach(d=>{ h+=`<tr><td>${d.depo}_${d.tours_count} db</td></tr>`; });
            $('#results').html(h+'</tbody></table>');
            return;
          }

          if(!data.length){
            $('#results').html('<p>Nincs találat.</p>');
            return;
          }

          let tbl='<table class="table table-bordered"><thead><tr>'
                 +'<th>Depó</th><th>Túraszám</th><th>Település</th>'
                 +'<th>Irányítószám</th><th>Közterület</th>'
                 +'<th>Nap</th><th>Időintervallum</th><th>Műveletek</th>'
                 +'</tr></thead><tbody>';
          data.forEach(d=>{
            tbl += `
            <tr class="summary" data-depo="${d.depo}" data-tour_number="${d.tour_number}">
              <td class="text-center">${d.depo}</td>
              <td class="text-center">${d.tour_number}</td>
              <td>${d.city}</td>
              <td class="text-center">${d.postal_code}</td>
              <td>${d.street}</td>
              <td class="text-center">${d.date}</td>
              <td class="text-center">${d.time_interval}</td>
              <td class="text-center">
                <button class="btn btn-info btn-sm details-btn">Részletek</button>
                <button class="btn btn-secondary btn-sm pdf-btn">PDF letöltés</button>
              </td>
            </tr>`;
          });
          $('#results').html(tbl+'</tbody></table>');
        },
        error(){ $('#results').html('<p>Hiba a keresés során.</p>'); }
      });

      /* mezők törlése katt után */
      $city.val(''); $street.val('');
    });

    /* ── részletek ── */
    $('#results').on('click','.details-btn',function(){
      const $tr = $(this).closest('.summary');
      $.get( backendUrl + 'details',
             { depo:$tr.data('depo'), tour_number:$tr.data('tour_number') },
             html=>{
               $('#details').html(html);
               $('html,body').animate({scrollTop:$('#details').offset().top},500);
             });
    });

    /* ── PDF ── */
    $('#results').on('click','.pdf-btn',function(){
      const $tr = $(this).closest('.summary');
      window.open(
        `${backendUrl}pdf?depo=${encodeURIComponent($tr.data('depo'))}`
        + `&tour_number=${encodeURIComponent($tr.data('tour_number'))}`
      );
    });

  });
  </script>
</body>
</html>

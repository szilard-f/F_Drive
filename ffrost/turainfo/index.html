<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma"        content="no-cache">
  <meta http-equiv="Expires"       content="0">
  <title>FF_túraadatok – részletes lekérdezés</title>

  <!-- ikonok – a projekt „static” mappájára mutatnak -->
  <link rel="icon"          href="static/images/fflogo.png" type="image/png">
  <link rel="shortcut icon" href="static/images/fflogo.png" type="image/png">

  <!-- Bootstrap, jQuery UI, FontAwesome -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

  <style>
    :root               { --logo-size: 180px; }                /* logó méret */
    .logo-container img { width:var(--logo-size); height:auto; }
    .btn                { display:inline-flex; align-items:center; justify-content:center; }
    .red                { color:red;  font-weight:bold; }
    .blue               { color:blue; font-weight:bold; }
    table.table th      { text-align:center !important; vertical-align:middle; }
  </style>
</head>
<body>
  <div class="container my-3">

    <!-- cím + logó -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3><span class="red">F</span><span class="blue">F</span>_túraadatok – részletes lekérdezés</h3>
      <div class="logo-container">
        <img src="static/images/fdlogo.png" alt="FF logo">
      </div>
    </div>

    <!-- keresőmezők -->
    <div class="form-group">
      <label for="search-input">Település vagy irányítószám</label>
      <input  id="search-input" class="form-control" style="width:300px" placeholder="Pl. Budapest vagy 1037">
    </div>

    <div class="form-group">
      <label for="street-input">Közterület (opcionális)</label>
      <input  id="street-input" class="form-control" style="width:300px" placeholder="Közterület">
      <small class="form-text text-muted">A közterület‑szűrés csak település megadása után működik!</small>
    </div>

    <div class="d-flex align-items-center mb-3">
      <button id="search-btn" class="btn btn-primary">Keresés</button>
      <button id="clear-btn"  class="btn btn-danger ml-3">Szűrések törlése</button>
    </div>

    <hr>
    <div id="results"></div>
    <div id="details"></div>
  </div>

  <!-- ====== JS LIBEK ====== -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

  <!-- ====== BACKEND CÍM – ugyanaz, mint a régi működő verzióban ====== -->
  <script>
    const backendUrl = "https://fabuszilard.myftp.org/turainfo/";   // <‑‑ PDF is ezt használja
  </script>

  <script>
  $(function(){

    /* ékezet‑szűrő a részletekhez – maradt a régi */
    const removeAccents = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");

    /* -------------- autocomplete -------------- */
    $('#search-input').autocomplete({
      source : (req,res)=>$.getJSON(backendUrl+'suggest',{field:'city',q:req.term},res),
      minLength : 2,
      xhrFields : { withCredentials:true }
    });

    $('#street-input').autocomplete({
      source : (req,res)=>{
        const city=$('#search-input').val().trim();
        if(!city){ res([]); return; }
        $.getJSON(backendUrl+'suggest',{field:'street',q:req.term,city},res);
      },
      minLength : 2,
      xhrFields : { withCredentials:true }
    });

    /* -------------- törlés gomb -------------- */
    $('#clear-btn').click(()=>{
      $('#search-input,#street-input').val('');
      $('#results,#details').empty();
    });

    /* -------------- keresés -------------- */
    $('#search-btn').click(()=>{
      const q=$('#search-input').val().trim(),
            s=$('#street-input').val().trim();
      $('#results,#details').empty();
      if(!q){ alert("Kérem adja meg a települést vagy irányítószámot!"); return; }

      $.ajax({
        url  : backendUrl+'search',
        data : {q,street:s},
        xhrFields:{withCredentials:true},
        success(data){

          /* admin‑admin összesítés */
          if(data.length && data[0].tours_count!==undefined){
            let h='<table class="table table-bordered"><thead><tr><th>Depó és feltöltött túrák száma</th></tr></thead><tbody>';
            data.forEach(i=>h+=`<tr><td>${i.depo}_${i.tours_count} db</td></tr>`);
            $('#results').html(h+'</tbody></table>');
            return;
          }

          /* nincs találat */
          if(!data.length){ $('#results').html('<p>Nincs találat.</p>'); return; }

          /* táblázat */
          let t='<table class="table table-bordered"><thead><tr>'
               +'<th class="text-center">Depó</th><th class="text-center">Túraszám</th>'
               +'<th class="text-center">Település</th><th class="text-center">Irányítószám</th>'
               +'<th class="text-center">Közterület</th><th class="text-center">Nap</th>'
               +'<th class="text-center">Időintervallum</th><th class="text-center">Műveletek</th>'
               +'</tr></thead><tbody>';
          data.forEach(it=>{
            t+=`<tr class="summary" data-depo="${it.depo}" data-tour_number="${it.tour_number}">
                 <td class="text-center">${it.depo}</td>
                 <td class="text-center">${it.tour_number}</td>
                 <td>${it.city}</td>
                 <td class="text-center">${it.postal_code}</td>
                 <td>${it.street}</td>
                 <td class="text-center">${it.date}</td>
                 <td class="text-center">${it.time_interval}</td>
                 <td class="text-center">
                   <button class="btn btn-info btn-sm details-btn">Részletek</button>
                   <button class="btn btn-secondary btn-sm pdf-btn">PDF letöltés</button>
                 </td>
               </tr>`;
          });
          $('#results').html(t+'</tbody></table>');
        },
        error:()=>$('#results').html('<p>Hiba történt a keresés során.</p>')
      });

      $('#search-input,#street-input').val('');
    });

    /* -------------- részletek -------------- */
    $('#results').on('click','.details-btn',function(){
      const r=$(this).closest('.summary');
      $.get(backendUrl+'details',{
        depo:r.data('depo'), tour_number:r.data('tour_number')
      }, html=>{
        $('#details').html(html);
        $('html,body').animate({scrollTop:$('#details').offset().top},500);
      });
    });

    /* -------------- PDF -------------- */
    $('#results').on('click','.pdf-btn',function(){
      const r=$(this).closest('.summary');
      // pontosan ugyanúgy hívjuk, ahogy a régi oldal tette
      window.open(
        backendUrl+'pdf?depo='+encodeURIComponent(r.data('depo'))
        +'&tour_number='+encodeURIComponent(r.data('tour_number'))
      );
    });

  });
  </script>
</body>
</html>
